name: Sync AI Pricing

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync pricing
        run: npm run sync:ai-pricing

      - name: Verify build
        run: npm run build

      - name: Create PR for pricing updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync AI provider pricing"
          title: "chore: sync AI provider pricing"
          body: |
            Automated weekly pricing sync from official provider pages.

            Updated via:
            - npm run sync:ai-pricing
          branch: chore/sync-ai-pricing
          delete-branch: true
          labels: |
            automated
            pricing
